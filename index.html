<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDU Mileage+</title>
  <meta name="description" content="EDU Mileage+ — automatic work mileage tracking for K-12 educators." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #00695c 0%, #00897b 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      text-align: center;
    }
    .brand {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 44px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }
    .tagline {
      font-size: 17px;
      line-height: 1.6;
      opacity: 0.92;
      margin-bottom: 36px;
    }
    .status {
      display: inline-block;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 32px;
      backdrop-filter: blur(10px);
    }
    .links {
      font-size: 14px;
      opacity: 0.85;
    }
    .links a {
      color: #ffffff;
      text-decoration: underline;
      margin: 0 8px;
    }
    .links a:hover { opacity: 1; }
    @media (max-width: 600px) {
      h1 { font-size: 32px; }
      .tagline { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">EDU Plus Apps</div>
    <h1>EDU Mileage+</h1>
    <p class="tagline">Automatic work mileage tracking, built for K-12 educators.</p>
    <div class="status">Coming Soon</div>
    <div class="links">
      <a href="https://eduplusapps.com/support/">Support</a> &middot;
      <a href="https://eduplusapps.com/privacy/">Privacy</a> &middot;
      <a href="https://eduplusapps.com/">EDU Plus Apps</a>
    </div>
  </div>
</body>
</html>
